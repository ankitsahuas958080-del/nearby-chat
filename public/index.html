<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Nearby Chat</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="box">

    <h1>💬 Nearby Chat</h1>

    <div id="messages"></div>

    <div class="bottom">

        <input
        type="text"
        id="name"
        placeholder="Name">

        <input
        type="text"
        id="message"
        placeholder="Type Message">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="script.js"></script>

</body>
</html>
